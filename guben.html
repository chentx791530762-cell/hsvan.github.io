<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大蒙皮固本 · 传统健体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #f9f6f1; --ink: #1a1a1a; --tan: #d2c1ae; --seal: #b22222; }
        body { font-family: 'Noto Serif SC', serif; background-color: var(--paper); }
        .calligraphy { font-family: 'Ma Shan Zheng', cursive; }
        .seal-logo { background-color: var(--seal); color: white; padding: 4px; writing-mode: vertical-rl; font-family: 'Ma Shan Zheng'; font-size: 0.8rem; }
        .card { background: white; border-bottom: 3px solid var(--tan); transition: all 0.3s; }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 py-6 px-6 bg-[#f9f6f1]/90 backdrop-blur-sm border-b border-stone-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="seal-logo">大蒙皮</div>
                <div class="calligraphy text-2xl tracking-widest">固本</div>
            </div>
            <a href="index.html" class="text-sm tracking-wider border-b border-stone-300 hover:border-black">⟵ 返回主页</a>
        </div>
    </nav>
    <main class="pt-28 max-w-5xl mx-auto px-6">
        <div class="text-center mb-16">
            <h1 class="calligraphy text-6xl mb-4">大蒙皮固本</h1>
            <p class="text-stone-500 tracking-wide">固本培元 · 刚柔并济</p>
        </div>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="card p-6 rounded-lg"><h2 class="text-xl font-bold mb-2">传统养生功法</h2><p class="text-stone-600">八段锦、太极拳、站桩，调理气血，松筋正骨。</p></div>
            <div class="card p-6 rounded-lg"><h2 class="text-xl font-bold mb-2">现代功能训练</h2><p class="text-stone-600">力量体能、普拉提、搏击塑形，科学增强核心。</p></div>
            <div class="card p-6 rounded-lg"><h2 class="text-xl font-bold mb-2">一对一私教</h2><p class="text-stone-600">体态矫正、运动康复、产后恢复，定制方案。</p></div>
        </div>
        <div class="mt-12 p-6 bg-white rounded-lg"><p class="calligraphy text-center text-stone-700">“内练精气神，外练筋骨皮 —— 大蒙皮固本，守正强身。” </p></div>
    </main>
    <footer class="mt-20 py-8 text-center text-stone-400 text-sm border-t border-stone-100">© 2025 大蒙皮固本 · 传统健身智慧</footer>
</body>
</html>
