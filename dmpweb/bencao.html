<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大蒙皮本草 · 道地药材</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #f9f6f1; --ink: #1a1a1a; --tan: #d2c1ae; --seal: #b22222; }
        body { font-family: 'Noto Serif SC', serif; background-color: var(--paper); }
        .calligraphy { font-family: 'Ma Shan Zheng', cursive; }
        .seal-logo { background-color: var(--seal); color: white; padding: 4px; writing-mode: vertical-rl; font-family: 'Ma Shan Zheng'; font-size: 0.8rem; }
        .card { background: white; border-bottom: 3px solid var(--tan); transition: all 0.3s; }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 py-6 px-6 bg-[#f9f6f1]/90 backdrop-blur-sm border-b border-stone-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="seal-logo">大蒙皮</div>
                <div class="calligraphy text-2xl tracking-widest">本草</div>
            </div>
            <a href="index.html" class="text-sm tracking-wider border-b border-stone-300 hover:border-black">⟵ 返回主页</a>
        </div>
    </nav>
    <main class="pt-28 max-w-5xl mx-auto px-6">
        <div class="text-center mb-16">
            <h1 class="calligraphy text-6xl mb-4">大蒙皮本草</h1>
            <p class="text-stone-500 tracking-wide">道地药材 · 古法炮制</p>
        </div>
        <div class="grid md:grid-cols-2 gap-12">
            <div class="card p-8 rounded-lg"><h2 class="text-2xl font-bold mb-3">精选饮片</h2><p class="text-stone-600">人参、黄芪、枸杞、陈皮等，产地直采，质检严格。</p></div>
            <div class="card p-8 rounded-lg"><h2 class="text-2xl font-bold mb-3">四季养生茶疗</h2><p class="text-stone-600">祛湿茶、安神饮、润肺汤包，顺应节气调理。</p></div>
            <div class="card p-8 rounded-lg"><h2 class="text-2xl font-bold mb-3">膏方定制</h2><p class="text-stone-600">老中医辨证，一人一方，古法铜锅熬制。</p></div>
            <div class="card p-8 rounded-lg"><h2 class="text-2xl font-bold mb-3">非遗炮制</h2><p class="text-stone-600">九蒸九晒、醋制酒制，传承经典技艺。</p></div>
        </div>
    </main>
    <footer class="mt-20 py-8 text-center text-stone-400 text-sm border-t border-stone-100">© 2025 大蒙皮本草 · 济世仁心</footer>
</body>
</html>
