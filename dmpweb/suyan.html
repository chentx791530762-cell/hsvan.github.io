<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大蒙皮素言 · 纯粹阅读之境</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f9f6f1;
            --ink: #1a1a1a;
            --tan: #d2c1ae;
            --seal: #b22222;
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--paper);
            color: var(--ink);
            background-image: radial-gradient(circle at 10% 20%, rgba(210,193,174,0.1) 0%, transparent 40%);
        }
        .calligraphy { font-family: 'Ma Shan Zheng', cursive; }
        .seal-logo {
            background-color: var(--seal);
            color: white;
            padding: 4px;
            writing-mode: vertical-rl;
            font-family: 'Ma Shan Zheng';
            font-size: 0.8rem;
        }
        .card {
            background: white;
            border-bottom: 3px solid var(--tan);
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-6px);
            border-bottom-color: var(--ink);
        }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 py-6 px-6 bg-[#f9f6f1]/90 backdrop-blur-sm border-b border-stone-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="seal-logo">大蒙皮</div>
                <div class="calligraphy text-2xl tracking-widest">素言</div>
            </div>
            <a href="index.html" class="text-sm tracking-wider border-b border-stone-300 hover:border-black">⟵ 返回主页</a>
        </div>
    </nav>

    <main class="pt-28 max-w-5xl mx-auto px-6">
        <div class="text-center mb-16">
            <h1 class="calligraphy text-6xl mb-4">大蒙皮素言</h1>
            <p class="text-stone-500 tracking-wide">返璞归真 · 且听素言</p>
        </div>
        <div class="grid md:grid-cols-2 gap-12">
            <div class="card p-8 rounded-lg">
                <h2 class="text-2xl font-bold mb-3">素言笔记</h2>
                <p class="text-stone-600 leading-loose">原创文学聚集地，涵盖散文、小说、诗歌。签约海内外优秀作者，每月举办“素言文学奖”。</p>
            </div>
            <div class="card p-8 rounded-lg">
                <h2 class="text-2xl font-bold mb-3">大蒙皮地理志</h2>
                <p class="text-stone-600 leading-loose">幻想题材系列作品，构建“皮卷”世界。已出版《皮卷秘闻录》《大漠蒙歌》。</p>
            </div>
            <div class="card p-8 rounded-lg">
                <h2 class="text-2xl font-bold mb-3">昨夜星辰诗社</h2>
                <p class="text-stone-600 leading-loose">古典诗词及现代诗创作平台，定期举办线上诗会与评奖。</p>
            </div>
            <div class="card p-8 rounded-lg">
                <h2 class="text-2xl font-bold mb-3">有声书馆</h2>
                <p class="text-stone-600 leading-loose">精品有声剧、广播剧开发，与知名配音团队合作。</p>
            </div>
        </div>
    </main>
    <footer class="mt-20 py-8 text-center text-stone-400 text-sm border-t border-stone-100">
        © 2025 大蒙皮素言 · 文字之温度
    </footer>
</body>
</html>
