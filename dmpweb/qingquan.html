<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大蒙皮清泉 · 汤泉涤尘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #f9f6f1; --ink: #1a1a1a; --tan: #d2c1ae; --seal: #b22222; }
        body { font-family: 'Noto Serif SC', serif; background-color: var(--paper); }
        .calligraphy { font-family: 'Ma Shan Zheng', cursive; }
        .seal-logo { background-color: var(--seal); color: white; padding: 4px; writing-mode: vertical-rl; font-family: 'Ma Shan Zheng'; font-size: 0.8rem; }
        .card { background: white; border-bottom: 3px solid var(--tan); transition: all 0.3s; }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 py-6 px-6 bg-[#f9f6f1]/90 backdrop-blur-sm border-b border-stone-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="seal-logo">大蒙皮</div>
                <div class="calligraphy text-2xl tracking-widest">清泉</div>
            </div>
            <a href="index.html" class="text-sm tracking-wider border-b border-stone-300 hover:border-black">⟵ 返回主页</a>
        </div>
    </nav>
    <main class="pt-28 max-w-5xl mx-auto px-6">
        <div class="text-center mb-16">
            <h1 class="calligraphy text-6xl mb-4">大蒙皮清泉</h1>
            <p class="text-stone-500 tracking-wide">涤尘清泉 · 身心绿洲</p>
        </div>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="card p-6 rounded-lg"><h2 class="text-xl font-bold mb-2">私汤·汗蒸·水疗</h2><p class="text-stone-600">天然矿物温泉，日式风吕，中药熏蒸，恒温系统。</p></div>
            <div class="card p-6 rounded-lg"><h2 class="text-xl font-bold mb-2">中医推拿</h2><p class="text-stone-600">经络疏通、精油开背、古法足疗，缓解疲劳。</p></div>
            <div class="card p-6 rounded-lg"><h2 class="text-xl font-bold mb-2">茶憩冥想</h2><p class="text-stone-600">汤泉后品养生茶，静坐冥想室，都市疗愈站。</p></div>
        </div>
    </main>
    <footer class="mt-20 py-8 text-center text-stone-400 text-sm border-t border-stone-100">© 2025 大蒙皮清泉 · 洗尽铅华</footer>
</body>
</html>
