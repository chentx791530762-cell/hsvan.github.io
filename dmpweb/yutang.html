<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大蒙皮语堂 · 言通四海</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #f9f6f1; --ink: #1a1a1a; --tan: #d2c1ae; --seal: #b22222; }
        body { font-family: 'Noto Serif SC', serif; background-color: var(--paper); color: var(--ink); }
        .calligraphy { font-family: 'Ma Shan Zheng', cursive; }
        .seal-logo { background-color: var(--seal); color: white; padding: 4px; writing-mode: vertical-rl; font-family: 'Ma Shan Zheng'; font-size: 0.8rem; }
        .card { background: white; border-bottom: 3px solid var(--tan); transition: all 0.3s; }
        .card:hover { transform: translateY(-6px); border-bottom-color: var(--ink); }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 py-6 px-6 bg-[#f9f6f1]/90 backdrop-blur-sm border-b border-stone-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="seal-logo">大蒙皮</div>
                <div class="calligraphy text-2xl tracking-widest">语堂</div>
            </div>
            <a href="index.html" class="text-sm tracking-wider border-b border-stone-300 hover:border-black">⟵ 返回主页</a>
        </div>
    </nav>
    <main class="pt-28 max-w-5xl mx-auto px-6">
        <div class="text-center mb-16">
            <h1 class="calligraphy text-6xl mb-4">大蒙皮语堂</h1>
            <p class="text-stone-500 tracking-wide">汇通东西 · 言辞无界</p>
        </div>
        <div class="grid md:grid-cols-2 gap-12">
            <div class="card p-8 rounded-lg"><h2 class="text-2xl font-bold mb-3">多语种研习</h2><p class="text-stone-600">英语、日语、韩语、法语、德语…… 沉浸式小班课，外教沙龙，考级辅导。</p></div>
            <div class="card p-8 rounded-lg"><h2 class="text-2xl font-bold mb-3">商务演说</h2><p class="text-stone-600">高端职场表达力培训，国际会议演讲技巧，跨文化沟通。</p></div>
            <div class="card p-8 rounded-lg"><h2 class="text-2xl font-bold mb-3">文化雅集</h2><p class="text-stone-600">每月一次语言与风土活动，茶道、俳句、法语电影之夜。</p></div>
            <div class="card p-8 rounded-lg"><h2 class="text-2xl font-bold mb-3">青少儿双语</h2><p class="text-stone-600">剑桥体系课程，故事剧场，自然拼读法。</p></div>
        </div>
    </main>
    <footer class="mt-20 py-8 text-center text-stone-400 text-sm border-t border-stone-100">© 2025 大蒙皮语堂 · 言语之美</footer>
</body>
</html>
