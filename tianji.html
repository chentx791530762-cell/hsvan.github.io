        function getHexagramInfo(binary) {
            return fullHexagramMap[binary] || { name: "乾为天", desc: "元亨利贞，自强不息。" };
        }

        function linesToSymbol(binary) {
            return binary.split('').map(bit => bit === '1' ? '───' : '─ ─').join('\n');
        }

        function randomHexagram() {
            let lines = [];
            for (let i = 0; i < 6; i++) lines.push(Math.random() < 0.5 ? '0' : '1');
            return lines.join('');
        }

        function getChanged(binary, moveIdx) {
            let arr = binary.split('');
            arr[moveIdx] = arr[moveIdx] === '0' ? '1' : '0';
            return arr.join('');
        }

        document.getElementById('castBtn').addEventListener('click', () => {
            const base = randomHexagram();
            const movingPos = Math.floor(Math.random() * 6);
            const mutated = getChanged(base, movingPos);
            const benInfo = getHexagramInfo(base);
            const bianInfo = getHexagramInfo(mutated);
            document.getElementById('benGuaName').innerText = benInfo.name;
            document.getElementById('bianGuaName').innerText = bianInfo.name;
            document.getElementById('benGuaLines').innerHTML = linesToSymbol(base).replace(/\n/g,'<br>');
            document.getElementById('bianGuaLines').innerHTML = linesToSymbol(mutated).replace(/\n/g,'<br>');
            document.getElementById('guaCi').innerHTML = `本卦：${benInfo.desc}<br>变卦：${bianInfo.desc}`;
            document.getElementById('dongYaoInfo').innerHTML = `⚡ 动爻：第${movingPos+1}爻 (初爻为1)`;
            document.getElementById('hexagramResult').classList.remove('hidden');
        });

        // --------------------------------------------------------------
        // 2. 八字排盘（纯 JavaScript 实现，不依赖任何外部库）
        // --------------------------------------------------------------
        const GAN = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
        const ZHI = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];

        // 年柱（以立春为界）
        function getYearGanZhi(year, month, day) {
            let y = year;
            if (month === 1 || (month === 2 && day < 4)) y = year - 1;
            const offset = (y - 4) % 60;
            return GAN[offset % 10] + ZHI[offset % 12];
        }

        // 月柱（五虎遁，月支以节气为界简化）
        function getMonthGanZhi(year, month, day, yearGan) {
            let m = month;
            let adjust = (day <= 4) ? -1 : 0;
            let zhiIndex = (m + 1 + adjust) % 12;
            if (zhiIndex < 0) zhiIndex += 12;
            const monthZhi = ZHI[zhiIndex];
            const yearGanFirst = yearGan[0];
            let startGanIndex = 0;
            if (yearGanFirst === '甲' || yearGanFirst === '己') startGanIndex = 0;
            else if (yearGanFirst === '乙' || yearGanFirst === '庚') startGanIndex = 2;
            else if (yearGanFirst === '丙' || yearGanFirst === '辛') startGanIndex = 4;
            else if (yearGanFirst === '丁' || yearGanFirst === '壬') startGanIndex = 6;
            else if (yearGanFirst === '戊' || yearGanFirst === '癸') startGanIndex = 8;
            const monthGanIndex = (startGanIndex + zhiIndex) % 10;
            return GAN[monthGanIndex] + monthZhi;
        }

        // 日柱（基准 1900-01-01 为甲午日）
        function getDayGanZhi(year, month, day) {
            const startDate = new Date(1900, 0, 1);
            const targetDate = new Date(year, month-1, day);
            const diffDays = Math.floor((targetDate - startDate) / (1000*60*60*24));
            const ganIndex = (0 + diffDays) % 10;
            const zhiIndex = (6 + diffDays) % 12;
            return GAN[ganIndex] + ZHI[zhiIndex];
        }

        // 时柱（五鼠遁）
        function getHourGanZhi(dayGan, hourVal) {
            const dayGanFirst = dayGan[0];
            let startIndex = 0;
            if (dayGanFirst === '甲' || dayGanFirst === '己') startIndex = 0;
            else if (dayGanFirst === '乙' || dayGanFirst === '庚') startIndex = 2;
            else if (dayGanFirst === '丙' || dayGanFirst === '辛') startIndex = 4;
            else if (dayGanFirst === '丁' || dayGanFirst === '壬') startIndex = 6;
            else if (dayGanFirst === '戊' || dayGanFirst === '癸') startIndex = 8;
            const hourZhi = ZHI[hourVal % 12];
            const ganIndex = (startIndex + hourVal) % 10;
            return GAN[ganIndex] + hourZhi;
        }

        // 纳音五行

            const map = {

            return map[ganZhi] || "——";
        }

        // 十神（基于日干）
        function getShiShen(gan, dayGan) {
            const ganMap = {甲:"木",乙:"木",丙:"火",丁:"火",戊:"土",己:"土",庚:"金",辛:"金",壬:"水",癸:"水"};
            if (!gan || !dayGan) return "";
            if (gan === dayGan) return "元";
            const dayWx = ganMap[dayGan];
            const targetWx = ganMap[gan];
            const yang = ["甲","丙","戊","庚","壬"];
            const yin = ["乙","丁","己","辛","癸"];
            if ((yang.includes(dayGan) && yin.includes(gan) && dayWx === targetWx) ||
                (yin.includes(dayGan) && yang.includes(gan) && dayWx === targetWx)) return "劫财";
            if (dayWx === targetWx) return "比肩";
            if ((dayWx === "木" && targetWx === "水") || (dayWx === "火" && targetWx === "木") ||
                (dayWx === "土" && targetWx === "火") || (dayWx === "金" && targetWx === "土") ||
                (dayWx === "水" && targetWx === "金")) return "正印";
            if ((dayWx === "木" && targetWx === "金") || (dayWx === "火" && targetWx === "水") ||
                (dayWx === "土" && targetWx === "木") || (dayWx === "金" && targetWx === "火") ||
                (dayWx === "水" && targetWx === "土")) return "正官";
            if ((dayWx === "木" && targetWx === "火") || (dayWx === "火" && targetWx === "土") ||
                (dayWx === "土" && targetWx === "金") || (dayWx === "金" && targetWx === "水") ||
                (dayWx === "水" && targetWx === "木")) return "食神";
            if ((dayWx === "木" && targetWx === "土") || (dayWx === "火" && targetWx === "金") ||
                (dayWx === "土" && targetWx === "水") || (dayWx === "金" && targetWx === "木") ||
                (dayWx === "水" && targetWx === "火")) return "正财";
            return "偏神";
        }

        function displayBazi() {
            const dateStr = document.getElementById('birthDate').value;
            const hourVal = parseInt(document.getElementById('birthHour').value);
            if (!dateStr) return;
            const [year, month, day] = dateStr.split('-').map(Number);
            const yearGz = getYearGanZhi(year, month, day);
            const monthGz = getMonthGanZhi(year, month, day, yearGz);
            const dayGz = getDayGanZhi(year, month, day);
            const hourGz = getHourGanZhi(dayGz, hourVal);
            const dayMaster = dayGz[0];
            const yearShi = getShiShen(yearGz[0], dayMaster);
            const monthShi = getShiShen(monthGz[0], dayMaster);
            const dayShi = getShiShen(dayGz[0], dayMaster);
            const hourShi = getShiShen(hourGz[0], dayMaster);
            const yearNa = getNaYin(yearGz);
            const monthNa = getNaYin(monthGz);
            const dayNa = getNaYin(dayGz);
            const hourNa = getNaYin(hourGz);

            const html = `
                <div class="bazi-grid">
                    <div class="bazi-item"><div class="text-xs text-stone-500">年柱</div><div class="font-bold text-lg">${yearGz}</div><div class="text-xs">${yearNa}</div><div class="text-xs text-seal">${yearShi}</div></div>
                    <div class="bazi-item"><div class="text-xs text-stone-500">月柱</div><div class="font-bold text-lg">${monthGz}</div><div class="text-xs">${monthNa}</div><div class="text-xs text-seal">${monthShi}</div></div>
                    <div class="bazi-item"><div class="text-xs text-stone-500">日柱</div><div class="font-bold text-lg">${dayGz}</div><div class="text-xs">${dayNa}</div><div class="text-xs text-seal">${dayShi}</div></div>
                    <div class="bazi-item"><div class="text-xs text-stone-500">时柱</div><div class="font-bold text-lg">${hourGz}</div><div class="text-xs">${hourNa}</div><div class="text-xs text-seal">${hourShi}</div></div>
                </div>
                <div class="text-sm text-stone-700 bg-stone-50 p-3 rounded">
                    <span class="font-semibold">日主：${dayMaster}</span><br>
                    十神：年${yearShi} 月${monthShi} 日${dayShi} 时${hourShi}<br>
                    纳音：${yearNa} · ${monthNa} · ${dayNa} · ${hourNa}<br>
                    <span class="text-xs text-stone-500">※ 八字推算基于传统公式，供参考。</span>
                </div>
            `;
            const resultDiv = document.getElementById('baziResult');
            resultDiv.innerHTML = html;
            resultDiv.classList.remove('hidden');
        }

        document.getElementById('baziBtn').addEventListener('click', displayBazi);
        window.addEventListener('DOMContentLoaded', () => {
            displayBazi();
        });
    </script>
</body>
</html>
