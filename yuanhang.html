<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大蒙皮远航 · 留学无忧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #f9f6f1; --ink: #1a1a1a; --tan: #d2c1ae; --seal: #b22222; }
        body { font-family: 'Noto Serif SC', serif; background-color: var(--paper); }
        .calligraphy { font-family: 'Ma Shan Zheng', cursive; }
        .seal-logo { background-color: var(--seal); color: white; padding: 4px; writing-mode: vertical-rl; font-family: 'Ma Shan Zheng'; font-size: 0.8rem; }
        .card { background: white; border-bottom: 3px solid var(--tan); transition: all 0.3s; }
        .card:hover { transform: translateY(-6px); border-bottom-color: var(--ink); }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 py-6 px-6 bg-[#f9f6f1]/90 backdrop-blur-sm border-b border-stone-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="seal-logo">大蒙皮</div>
                <div class="calligraphy text-2xl tracking-widest">远航</div>
            </div>
            <a href="index.html" class="text-sm tracking-wider border-b border-stone-300 hover:border-black">⟵ 返回主页</a>
        </div>
    </nav>
    <main class="pt-28 max-w-5xl mx-auto px-6">
        <div class="text-center mb-16">
            <h1 class="calligraphy text-6xl mb-4">大蒙皮远航</h1>
            <p class="text-stone-500 tracking-wide">乘风渡海 · 名校坦途</p>
        </div>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="card p-6 rounded-lg"><h2 class="text-xl font-bold mb-2">全程规划</h2><p class="text-stone-600">选校定位、文书润色、签证辅导、行前指南，一对一精英导师。</p></div>
            <div class="card p-6 rounded-lg"><h2 class="text-xl font-bold mb-2">背景提升</h2><p class="text-stone-600">科研/实习/竞赛内推，海外暑研，打造硬核履历。</p></div>
            <div class="card p-6 rounded-lg"><h2 class="text-xl font-bold mb-2">海外护航</h2><p class="text-stone-600">住宿安排、法律咨询、学业督导，全程陪伴。</p></div>
        </div>
        <div class="mt-12 bg-white p-8 rounded-lg border-l-8 border-seal shadow-sm"><p class="text-stone-700 italic">“2024年远航学子共收获 237 枚 QS前100 offer，藤校/G5录取率提升40%。”</p></div>
    </main>
    <footer class="mt-20 py-8 text-center text-stone-400 text-sm border-t border-stone-100">© 2025 大蒙皮远航 · 渡向梦想</footer>
</body>
</html>
